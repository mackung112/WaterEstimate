<div class="fade-in pb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-end mb-3 gap-3">
        <div>
            <h4 class="text-primary fw-bold mb-1">
                <i class="fa-solid fa-boxes-stacked me-2"></i>คลังวัสดุ
            </h4>
            <div class="d-flex flex-wrap align-items-center gap-2">
                <span class="badge bg-white text-secondary border shadow-sm px-3 py-2 rounded-pill fw-normal">
                    <i class="fa-solid fa-layer-group me-1 text-primary"></i> ทั้งหมด <span id="matTotalCount"
                        class="fw-bold text-dark mx-1">...</span> รายการ
                </span>
                <span
                    class="badge bg-white text-secondary border shadow-sm px-3 py-2 rounded-pill fw-normal d-none d-md-inline-flex">
                    <i class="fa-solid fa-server me-1 text-success"></i> สถานะ: พร้อม
                </span>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4 bg-white">
        <div class="card-body p-2">
            <div class="row g-2 align-items-center">

                <div class="col-12 col-md">
                    <div class="position-relative">
                        <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" id="matSearchInput"
                            class="form-control border-0 bg-light rounded-pill ps-5 py-2"
                            placeholder="ค้นหารหัส, ชื่อ, ขนาด..." onkeyup="Materials.filter()">
                    </div>
                </div>

                <div class="col-6 col-md-auto">
                    <select class="form-select border-0 bg-light rounded-pill py-2 text-muted text-truncate"
                        style="min-width: 140px; max-width: 100%;" id="catFilter" onchange="Materials.filter()">
                        <option value="">ทุกหมวดหมู่</option>
                        <option value="1. ส่วนติดตั้งมาตรวัดน้ำ">1. มาตรวัดน้ำ</option>
                        <option value="2. ส่วนค่าติดตั้งเหมาจ่าย">2. เหมาจ่าย</option>
                        <option value="3. ส่วนวางท่อภายใน">3. ท่อภายใน</option>
                        <option value="4. ส่วนวางท่อภายนอก">4. ท่อภายนอก</option>
                        <option value="7. ส่วนค่าธรรมเนียมประสานท่อ">7. ธรรมเนียม</option>
                        <option value="8. เงินประกันมาตรวัดน้ำ">8. เงินประกัน</option>
                    </select>
                </div>

                <div class="col-auto">
                    <button class="btn btn-light rounded-circle text-muted" onclick="Materials.init(true)"
                        title="รีเฟรชข้อมูล">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>

                <div class="col-6 col-md-auto">
                    <button
                        class="btn btn-primary w-100 rounded-pill px-3 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2 btn-hover-scale"
                        onclick="Materials.openModal()">
                        <i class="fa-solid fa-plus"></i>
                        <span class="d-none d-md-inline">เพิ่มรายการ</span>
                        <span class="d-inline d-md-none">เพิ่ม</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="glass-card overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="materialsTable">
                <thead class="bg-light text-secondary">
                    <tr class="text-uppercase small fw-bold text-muted">
                        <th class="ps-4 py-3 d-none d-md-table-cell cursor-pointer" style="width: 10%;"
                            onclick="Materials.sort('materialId')">
                            รหัส <i class="fa-solid fa-sort ms-1" id="sort-materialId"></i>
                        </th>

                        <th style="min-width: 150px;" class="cursor-pointer" onclick="Materials.sort('itemName')">
                            ชื่อรายการ (Item Name) <i class="fa-solid fa-sort ms-1" id="sort-itemName"></i>
                        </th>

                        <th class="d-none d-md-table-cell" style="width: 15%;">ขนาด / หน่วย</th>

                        <th class="d-none d-md-table-cell cursor-pointer" style="width: 15%;"
                            onclick="Materials.sort('category')">
                            หมวดหมู่ <i class="fa-solid fa-sort ms-1" id="sort-category"></i>
                        </th>

                        <th class="text-end d-none d-md-table-cell cursor-pointer" style="width: 10%;"
                            onclick="Materials.sort('unitPriceMaterial')">
                            ราคาวัสดุ <i class="fa-solid fa-sort ms-1" id="sort-unitPriceMaterial"></i>
                        </th>

                        <th class="text-end d-none d-md-table-cell cursor-pointer" style="width: 10%;"
                            onclick="Materials.sort('unitPriceLabor')">
                            ค่าแรง <i class="fa-solid fa-sort ms-1" id="sort-unitPriceLabor"></i>
                        </th>

                        <th class="text-end pe-4" style="min-width: 60px;">จัดการ</th>
                    </tr>
                </thead>
                <tbody class="border-top-0" id="materialsTableBody">
                </tbody>
            </table>
        </div>

        <div id="matEmptyState" class="text-center py-5 d-none">
            <div class="mb-3 text-muted opacity-50">
                <i class="fa-solid fa-box-open fa-3x"></i>
            </div>
            <h6 class="text-muted">ไม่พบข้อมูลวัสดุ</h6>
        </div>
    </div>
</div>

<div class="modal fade" id="materialModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 pb-0 ps-4 pt-4">
                <h5 class="modal-title fw-bold text-primary" id="materialModalLabel">
                    <i class="fa-solid fa-pen-to-square me-2"></i>ข้อมูลวัสดุ
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="materialForm" class="row g-3">

                    <div class="col-12">
                        <label class="form-label fw-bold text-dark">ชื่อรายการ</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-primary border-end-0"><i
                                    class="fa-solid fa-tag"></i></span>
                            <input type="text" name="Item_Name" class="form-control border-start-0" required
                                placeholder="เช่น ท่อ PVC ชั้น 8.5" autofocus>
                        </div>
                    </div>

                    <div class="col-6 col-md-3">
                        <label class="form-label fw-bold text-muted small">รหัส (ID)</label>
                        <input type="text" name="Material_ID" class="form-control bg-light" placeholder="Auto">
                    </div>

                    <div class="col-6 col-md-3">
                        <label class="form-label fw-bold text-muted small">ขนาด</label>
                        <input type="text" name="Size" class="form-control" placeholder='เช่น 1/2"'>
                    </div>

                    <div class="col-6 col-md-2">
                        <label class="form-label fw-bold text-muted small">หน่วย</label>
                        <input type="text" name="Unit" class="form-control" placeholder="เช่น อัน" list="unitList">
                        <datalist id="unitList">
                            <option value="อัน">
                            <option value="ชิ้น">
                            <option value="ชุด">
                            <option value="เมตร">
                            <option value="ท่อน">
                            <option value="เส้น">
                            <option value="กล่อง">
                            <option value="เครื่อง">
                        </datalist>
                    </div>

                    <div class="col-6 col-md-4">
                        <label class="form-label fw-bold text-muted small">หมวดหมู่</label>
                        <select name="Category" class="form-select" required>
                            <option value="">-- เลือก --</option>
                            <option value="1. ส่วนติดตั้งมาตรวัดน้ำ">1. ส่วนติดตั้งมาตรวัดน้ำ</option>
                            <option value="2. ส่วนค่าติดตั้งเหมาจ่าย">2. ส่วนค่าติดตั้งเหมาจ่าย</option>
                            <option value="3. ส่วนวางท่อภายใน">3. ส่วนวางท่อภายใน</option>
                            <option value="4. ส่วนวางท่อภายนอก">4. ส่วนวางท่อภายนอก</option>
                            <option value="7. ส่วนค่าธรรมเนียมประสานท่อ">7. ส่วนค่าธรรมเนียมประสานท่อ</option>
                            <option value="8. เงินประกันมาตรวัดน้ำ">8. เงินประกันมาตรวัดน้ำ</option>
                        </select>
                    </div>

                    <div class="col-6">
                        <div class="p-2 p-md-3 bg-light rounded-3 border h-100">
                            <label class="form-label fw-bold text-primary small mb-1">ราคาวัสดุ</label>
                            <div class="input-group input-group-sm">
                                <input type="number" step="0.01" name="UnitPrice_Material" class="form-control fw-bold"
                                    placeholder="0">
                            </div>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="p-2 p-md-3 bg-light rounded-3 border h-100">
                            <label class="form-label fw-bold text-success small mb-1">ค่าแรง</label>
                            <div class="input-group input-group-sm">
                                <input type="number" step="0.01" name="Unit_Price_Labor" class="form-control fw-bold"
                                    placeholder="0">
                            </div>
                        </div>
                    </div>

                </form>
            </div>
            <div class="modal-footer border-top-0 px-4 pb-4">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="Materials.save()">
                    <i class="fa-solid fa-check me-2"></i>บันทึก
                </button>
            </div>
        </div>
    </div>
</div>
