<div class="fade-in pb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-end mb-3 gap-3">
        <div>
            <h4 class="text-primary fw-bold mb-1">
                <i class="fa-solid fa-users-gear me-2"></i>บุคลากร
            </h4>
            <div class="d-flex flex-wrap align-items-center gap-2">
                <span class="badge bg-white text-secondary border shadow-sm px-3 py-2 rounded-pill fw-normal">
                    <i class="fa-solid fa-users me-1 text-primary"></i> ทั้งหมด <span id="perTotalCount"
                        class="fw-bold text-dark mx-1">...</span> คน
                </span>
                <span
                    class="badge bg-white text-secondary border shadow-sm px-3 py-2 rounded-pill fw-normal d-none d-md-inline-flex">
                    <i class="fa-solid fa-circle-check me-1 text-success"></i> สถานะ: พร้อม
                </span>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4 bg-white">
        <div class="card-body p-2">
            <div class="row g-2 align-items-center">

                <div class="col-12 col-md">
                    <div class="position-relative">
                        <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" id="searchInput"
                            class="form-control border-0 bg-light rounded-pill ps-5 py-2"
                            placeholder="ค้นหาชื่อ, ตำแหน่ง..." onkeyup="Personnel.filter()">
                    </div>
                </div>

                <div class="col-6 col-md-auto">
                    <select class="form-select border-0 bg-light rounded-pill py-2 text-muted" style="min-width: 160px;"
                        id="roleFilter" onchange="Personnel.filter()">
                        <option value="">ทุกบทบาท</option>
                        <option value="Surveyor">ผู้สำรวจ</option>
                        <option value="Inspector">ผู้ตรวจสอบ</option>
                        <option value="Approver">ผู้อนุมัติ</option>
                    </select>
                </div>

                <div class="col-auto">
                    <button class="btn btn-light rounded-circle text-muted" onclick="Personnel.init(true)"
                        title="รีเฟรชข้อมูล">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>

                <div class="col-6 col-md-auto">
                    <button
                        class="btn btn-primary w-100 rounded-pill px-3 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2 btn-hover-scale"
                        onclick="Personnel.openModal()">
                        <i class="fa-solid fa-user-plus"></i>
                        <span class="d-none d-md-inline">เพิ่มบุคลากร</span>
                        <span class="d-inline d-md-none">เพิ่ม</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="glass-card overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="personnelTable">
                <thead class="bg-light text-secondary">
                    <tr class="text-uppercase small fw-bold text-muted">
                        <th class="ps-4 py-3 cursor-pointer" style="min-width: 200px;" onclick="Personnel.sort('name')">
                            ชื่อ-สกุล (Name) <i class="fa-solid fa-sort ms-1" id="sort-name"></i>
                        </th>

                        <th class="d-none d-md-table-cell cursor-pointer" style="width: 25%;"
                            onclick="Personnel.sort('position')">
                            ตำแหน่ง <i class="fa-solid fa-sort ms-1" id="sort-position"></i>
                        </th>

                        <th style="min-width: 100px;" class="cursor-pointer" onclick="Personnel.sort('roleType')">
                            บทบาท <i class="fa-solid fa-sort ms-1" id="sort-roleType"></i>
                        </th>

                        <th class="text-center d-none d-md-table-cell" style="width: 10%;">ลายเซ็น</th>

                        <th class="text-end pe-4" style="min-width: 80px;">จัดการ</th>
                    </tr>
                </thead>
                <tbody class="border-top-0" id="personnelTableBody">
                </tbody>
            </table>
        </div>

        <div id="perEmptyState" class="text-center py-5 d-none">
            <div class="mb-3 text-muted opacity-50">
                <i class="fa-solid fa-user-slash fa-3x"></i>
            </div>
            <h6 class="text-muted">ไม่พบข้อมูลบุคลากร</h6>
        </div>
    </div>
</div>

<div class="modal fade" id="personnelModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 pb-0 ps-4 pt-4">
                <h5 class="modal-title fw-bold text-primary" id="personnelModalLabel">
                    <i class="fa-solid fa-user-pen me-2"></i>ข้อมูลบุคลากร
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="personnelForm" class="row g-3">
                    <input type="hidden" name="Personnel_ID">

                    <div class="col-12">
                        <label class="form-label fw-bold text-dark">ชื่อ-สกุล</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-primary border-end-0"><i
                                    class="fa-solid fa-user"></i></span>
                            <input type="text" name="Name" class="form-control border-start-0" required
                                placeholder="เช่น นายสมชาย ใจดี" autofocus>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small">ตำแหน่ง</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-success"><i
                                    class="fa-solid fa-briefcase"></i></span>
                            <input type="text" name="Position" class="form-control border-start-0" required
                                placeholder="เช่น ผู้จัดการ">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small">ลายเซ็น (URL)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-secondary"><i
                                    class="fa-solid fa-link"></i></span>
                            <input type="url" name="Signature_URL" id="sigUrlInput" class="form-control border-start-0"
                                placeholder="https://..." oninput="Personnel.previewImage(this.value)">
                        </div>
                    </div>

                    <div class="col-12" id="sigPreviewBox" style="display: none;">
                        <div class="text-center p-3 bg-light rounded-3 border border-dashed">
                            <img id="sigPreviewImg" src="" alt="Preview" style="height: 60px; object-fit: contain;">
                            <div class="small text-muted mt-1">ตัวอย่างลายเซ็น</div>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold text-muted small mb-2">บทบาท (Role Type)</label>
                        <div class="row g-2">
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="Role_Type" id="role1" value="Surveyor"
                                    required>
                                <label
                                    class="btn btn-outline-light text-dark w-100 border h-100 d-flex flex-column align-items-center justify-content-center py-3 rounded-3 shadow-sm"
                                    for="role1">
                                    <i class="fa-solid fa-compass text-primary fs-4 mb-2"></i>
                                    <span class="small fw-bold">ผู้สำรวจ</span>
                                </label>
                            </div>
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="Role_Type" id="role2" value="Inspector">
                                <label
                                    class="btn btn-outline-light text-dark w-100 border h-100 d-flex flex-column align-items-center justify-content-center py-3 rounded-3 shadow-sm"
                                    for="role2">
                                    <i class="fa-solid fa-clipboard-check text-success fs-4 mb-2"></i>
                                    <span class="small fw-bold">ผู้ตรวจ</span>
                                </label>
                            </div>
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="Role_Type" id="role3" value="Approver">
                                <label
                                    class="btn btn-outline-light text-dark w-100 border h-100 d-flex flex-column align-items-center justify-content-center py-3 rounded-3 shadow-sm"
                                    for="role3">
                                    <i class="fa-solid fa-signature text-warning fs-4 mb-2"></i>
                                    <span class="small fw-bold">ผู้อนุมัติ</span>
                                </label>
                            </div>
                        </div>
                        <style>
                            /* สไตล์พิเศษสำหรับปุ่มเลือกบทบาท */
                            .btn-check:checked+label {
                                background-color: #f0f7ff;
                                border-color: #0d6efd !important;
                                color: #0d6efd !important;
                                box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
                            }
                        </style>
                    </div>

                </form>
            </div>
            <div class="modal-footer border-top-0 px-4 pb-4">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="Personnel.save()">
                    <i class="fa-solid fa-check me-2"></i>บันทึก
                </button>
            </div>
        </div>
    </div>
</div>
